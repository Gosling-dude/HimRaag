name: himraag
description: HimRaag - Pahadi Music, Heart of the Hills
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Audio
  just_audio: ^0.9.40
  just_audio_background: ^0.0.1-beta.12

  # Firebase
  firebase_core: ^3.4.0
  firebase_auth: ^5.2.0
  cloud_firestore: ^5.4.0
  firebase_storage: ^12.2.0
  firebase_analytics: ^11.3.0
  firebase_crashlytics: ^4.1.0

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.4

  # Networking & Downloads
  dio: ^5.7.0

  # UI
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  google_fonts: ^6.2.1
  animations: ^2.0.11

  # Navigation
  go_router: ^14.3.0

  # Utils
  collection: ^1.18.0
  equatable: ^2.0.5
  uuid: ^4.5.0

  # Google Sign In
  google_sign_in: ^6.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.12

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/
